<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Lara</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="dashboard.html" style="color: #00d68f;">
                <div class="p-2 rounded-3 d-flex align-items-center justify-content-center" style="background-color: #00d68f;">
                    <i data-lucide="hand-metal" class="text-white"></i>
                </div>
                <span style="letter-spacing: -0.02em; font-size: 1.5rem;">LARA</span>
            </a>
            <div class="navbar-nav ms-auto align-items-center gap-3">
                <span class="badge bg-light text-dark p-2 border rounded-pill">
                    <span class="text-success me-1">●</span> Estudiante: Usuario Demo
                </span>
                <a href="index.html" class="btn btn-outline-secondary btn-sm d-flex align-items-center gap-2">
                    <i data-lucide="log-out" size="16"></i> Cerrar Sesión
                </a>
            </div>
        </div>
    </nav>

    <main class="py-5">
        <div class="container">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-5 gap-3">
                <div>
                    <h2 class="fw-bold d-flex align-items-center gap-2">
                        <i data-lucide="layout-dashboard" style="color: #00d68f;"></i> Panel de Control
                    </h2>
                    <p class="text-muted mb-0">Gestiona tus cursos y actividades</p>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-lg-8">
                    <section class="mb-5">
                        <h3 class="fw-bold h5 mb-4">Mis Cursos Matriculados</h3>
                        <div class="row g-3">
                            <div class="col-sm-6">
                                <a href="course-detail.html" class="text-decoration-none text-dark">
                                    <div class="card h-100 border-0 shadow-sm cursor-pointer hover-card">
                                        <div class="bg-light d-flex align-items-center justify-content-center py-5 rounded-top">
                                            <i data-lucide="book-open" size="40" class="text-primary opacity-50"></i>
                                        </div>
                                        <div class="card-body">
                                            <h5 class="card-title fw-bold">Introducción a la LSE</h5>
                                            <p class="card-text text-muted small text-truncate">Aprende los fundamentos básicos de la Lengua de Señas Española.</p>
                                            <div class="d-flex justify-content-between align-items-center mt-3 small text-muted">
                                                <span><i data-lucide="calendar" size="12" class="me-1"></i> 2024-03-01</span>
                                                <i data-lucide="chevron-right" size="16"></i>
                                            </div>
                                        </div>
                                    </div>
                                </a>
                            </div>
                        </div>
                    </section>
                </div>

                <div class="col-lg-4">
                    <div class="card text-white border-0 shadow-sm mb-4" style="background-color: #00d68f;">
                        <div class="card-body p-4">
                            <h3 class="h5 fw-bold mb-3">Próximas Tareas</h3>
                            <p class="small opacity-75 mb-4">No tienes tareas pendientes para esta semana.</p>
                            <button class="btn btn-light w-100 fw-bold" style="color: #00d68f;">Ver Calendario</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>lucide.createIcons();</script>
</body>
</html>
